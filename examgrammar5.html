<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--b50:#f0f5ff;--b100:#dae5ff;--b200:#b8cfff;--b300:#8ab4ff;
--b400:#5a95fc;--b500:#3575f0;--b600:#1d5ae0;--b700:#1648c2;
--b800:#143d9e;--b900:#0e2d6e;--b950:#091b42;
--w:#ffffff;--g50:#f7f9fc;--g100:#eef2f7;--g200:#dde3ed;
--g300:#c3cdd9;--g400:#8d9bae;--g500:#5e6e82;--g600:#3f4d5e;
--r:16px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--b950)}

/* ═══ WELCOME ═══ */
#welcome{
position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;
background:linear-gradient(145deg,#071632 0%,var(--b950) 35%,#0d2248 70%,#091b42 100%);
overflow-y:auto;
}
#welcome::before{
content:'';position:absolute;inset:0;pointer-events:none;
background:
  radial-gradient(ellipse 600px 400px at 25% 15%,rgba(53,117,240,.10),transparent),
  radial-gradient(ellipse 500px 500px at 75% 85%,rgba(29,90,224,.08),transparent);
}
#welcome::after{
content:'';position:absolute;inset:0;pointer-events:none;
background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='.6' fill='%23ffffff' fill-opacity='.03'/%3E%3C/svg%3E");
}

.wcard{
position:relative;width:min(460px,92vw);
background:linear-gradient(165deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
border:1px solid rgba(255,255,255,.09);border-radius:28px;
padding:48px 40px 44px;text-align:center;
backdrop-filter:blur(30px);
animation:wIn .65s cubic-bezier(.16,1,.3,1) both;
}
.wcard::before{
content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
width:60%;height:1px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
}
@keyframes wIn{from{opacity:0;transform:translateY(36px) scale(.97)}to{opacity:1;transform:none}}

.wcard .logo{margin-bottom:30px}
.wcard .logo img{height:52px;filter:drop-shadow(0 2px 12px rgba(53,117,240,.25))}
.wcard h1{font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:700;color:var(--w);margin-bottom:3px;letter-spacing:-.4px}
.wcard .sub{font-size:.8rem;color:var(--b300);margin-bottom:10px;font-weight:400}
.wcard .badge{
display:inline-flex;align-items:center;gap:6px;margin-bottom:32px;
background:rgba(53,117,240,.12);border:1px solid rgba(53,117,240,.22);
border-radius:20px;padding:5px 18px;font-size:.7rem;
color:var(--b200);font-weight:500;letter-spacing:.7px;text-transform:uppercase;
}
.wcard .badge b{color:var(--b300);font-weight:800}

.fg{margin-bottom:18px;text-align:left}
.fg label{display:block;font-size:.7rem;font-weight:700;color:var(--b300);margin-bottom:7px;text-transform:uppercase;letter-spacing:.7px}
.fg input{
width:100%;padding:14px 18px;border-radius:13px;
border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.05);
color:var(--w);font-size:.92rem;font-family:'DM Sans',sans-serif;
outline:none;transition:border .2s,box-shadow .2s;
}
.fg input::placeholder{color:rgba(255,255,255,.22)}
.fg input:focus{border-color:var(--b400);box-shadow:0 0 0 3px rgba(53,117,240,.15)}

.pins{display:flex;gap:11px;justify-content:center}
.pins input{
width:54px;height:60px;text-align:center;font-size:1.5rem;font-weight:800;
border-radius:14px;border:1px solid rgba(255,255,255,.10);
background:rgba(255,255,255,.05);color:var(--w);
font-family:'Outfit',sans-serif;outline:none;transition:border .2s,box-shadow .2s;
}
.pins input:focus{border-color:var(--b400);box-shadow:0 0 0 3px rgba(53,117,240,.15)}
.werr{color:#fb7185;font-size:.78rem;margin-top:10px;min-height:20px;font-weight:500}

.gobtn{
margin-top:28px;width:100%;padding:15px;border:none;border-radius:14px;
background:linear-gradient(135deg,var(--b500),var(--b600));
color:var(--w);font-size:.95rem;font-weight:700;cursor:pointer;
font-family:'DM Sans',sans-serif;letter-spacing:.3px;
transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;
}
.gobtn::after{
content:'';position:absolute;inset:0;
background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.08) 100%);
}
.gobtn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(29,90,224,.35)}
.gobtn:active{transform:scale(.985)}

/* ═══ PROCTOR ═══ */
#proctor{
position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;
background:rgba(9,27,66,.96);backdrop-filter:blur(16px);
}
.pcard{
background:linear-gradient(165deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
border:1px solid rgba(255,255,255,.10);border-radius:26px;
padding:44px 38px;text-align:center;width:min(410px,90vw);
animation:wIn .45s cubic-bezier(.16,1,.3,1) both;
}
.pcard .ic{font-size:3.2rem;margin-bottom:14px}
.pcard h2{color:var(--w);font-size:1.15rem;font-weight:700;margin-bottom:8px;font-family:'Outfit',sans-serif}

.ppins{display:flex;gap:11px;justify-content:center;margin-bottom:10px}
.ppins input{
width:54px;height:60px;text-align:center;font-size:1.5rem;font-weight:800;
border-radius:14px;border:1px solid rgba(255,255,255,.10);
background:rgba(255,255,255,.05);color:var(--w);

.perr{color:#fb7185;font-size:.78rem;min-height:20px;margin-bottom:12px;font-weight:500}
.pbtn{
padding:13px 36px;border:none;border-radius:13px;
background:linear-gradient(135deg,var(--b500),var(--b600));
color:var(--w);font-size:.9rem;font-weight:700;cursor:pointer;
font-family:'DM Sans',sans-serif;
}

/* ═══ EXAM ═══ */
#exam{display:none;height:100vh;overflow:hidden;background:linear-gradient(165deg,#071632,var(--b950) 50%,#0d2248)}
.elayout{display:flex;flex-direction:column;height:100%}

.topbar{
display:flex;align-items:center;justify-content:space-between;
padding:13px 26px;
background:rgba(255,255,255,.035);border-bottom:1px solid rgba(255,255,255,.06);
flex-shrink:0;
}
.topbar .tl{display:flex;align-items:center;gap:14px}
.topbar .tl img{height:28px;filter:drop-shadow(0 1px 6px rgba(53,117,240,.2))}
.topbar .tl .tt{color:var(--b200);font-size:.8rem;font-weight:700;letter-spacing:.4px;font-family:'Outfit',sans-serif}
.topbar .tr{display:flex;align-items:center;gap:18px}
.sname{color:var(--b300);font-size:.76rem;font-weight:500}

/* ring */
.ring-w{position:relative;width:44px;height:44px;cursor:default}
.ring-w svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.07);stroke-width:3.8}
.ring-fg{fill:none;stroke:var(--b400);stroke-width:3.8;stroke-linecap:round;transition:stroke-dashoffset .45s ease}
.ring-t{
position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
font-size:.6rem;font-weight:800;color:var(--b200);font-family:'Outfit',sans-serif;
}

/* questions */
.qscroll{flex:1;overflow-y:auto;padding:26px 0;scroll-behavior:smooth}
.qscroll::-webkit-scrollbar{width:5px}
.qscroll::-webkit-scrollbar-track{background:transparent}
.qscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}

.qlist{max-width:760px;margin:0 auto;padding:0 22px}
.qc{
background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);

}
.qc:hover{border-color:rgba(53,117,240,.18)}
.qc.answered{border-color:rgba(53,117,240,.22);box-shadow:inset 0 0 0 1px rgba(53,117,240,.06)}
.qn{font-size:.68rem;font-weight:800;color:var(--b400);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px;font-family:'Outfit',sans-serif}
.qt{color:var(--b100);font-size:.92rem;line-height:1.7;margin-bottom:20px;font-weight:400}
.qt .bl{display:inline-block;min-width:70px;border-bottom:2px solid var(--b400);margin:0 3px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:540px){.opts{grid-template-columns:1fr}}
.ob{
display:flex;align-items:center;gap:11px;padding:13px 16px;border-radius:13px;
border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);
cursor:pointer;transition:all .2s;color:var(--b200);font-size:.86rem;
font-family:'DM Sans',sans-serif;text-align:left;
}
.ob:hover{background:rgba(53,117,240,.07);border-color:rgba(53,117,240,.18)}
.ob.sel{background:rgba(53,117,240,.13);border-color:var(--b400);color:var(--w)}
.ol{
width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
font-weight:800;font-size:.76rem;flex-shrink:0;font-family:'Outfit',sans-serif;
background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);transition:all .2s;
}
.ob.sel .ol{background:var(--b500);border-color:var(--b500);color:var(--w)}

/* bottom */
.bbar{
display:flex;align-items:center;justify-content:center;gap:14px;
padding:16px 26px;background:rgba(255,255,255,.035);
border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.bb{
padding:14px 34px;border:none;border-radius:13px;
font-size:.87rem;font-weight:700;cursor:pointer;
font-family:'DM Sans',sans-serif;transition:all .15s;letter-spacing:.2px;
}
.bsub{background:linear-gradient(135deg,var(--b500),var(--b600));color:var(--w)}
.bsub:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(29,90,224,.3)}
.bcopy{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);color:var(--b200)}
.bcopy:hover{background:rgba(255,255,255,.11)}

/* ═══ RESULT ═══ */
#result{
display:none;position:fixed;inset:0;z-index:8000;
background:linear-gradient(145deg,var(--b950),#0d2248 60%,#091b42);
overflow-y:auto;
}
.rinner{max-width:620px;margin:0 auto;padding:52px 22px;text-align:center}
.rinner .ric{font-size:3.6rem;margin-bottom:14px}
.rinner h2{color:var(--w);font-size:1.35rem;font-weight:800;margin-bottom:5px;font-family:'Outfit',sans-serif}
.rinner .rsub{color:var(--b300);font-size:.86rem;margin-bottom:34px}
.ranswers{
text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
border-radius:18px;padding:26px 30px;margin-bottom:30px;
}
.ranswers h3{color:var(--b200);font-size:.82rem;font-weight:800;margin-bottom:18px;text-transform:uppercase;letter-spacing:.7px;font-family:'Outfit',sans-serif}
.ragrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:9px}
.rai{
display:flex;align-items:center;gap:9px;padding:9px 13px;
border-radius:11px;background:rgba(255,255,255,.035);
border:1px solid rgba(255,255,255,.06);
}
.rai .rq{font-size:.72rem;font-weight:800;color:var(--b400);min-width:28px;font-family:'Outfit',sans-serif}
.rai .ra{font-size:.85rem;color:var(--w);font-weight:600}
.rai.un{opacity:.35}
.rai.un .ra{color:var(--b400);font-style:italic;font-size:.72rem}
.rbtns{display:flex;gap:13px;justify-content:center;flex-wrap:wrap}
.rbtns .bb{min-width:165px}

/* toast */
.toast{
position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);
background:var(--b600);color:var(--w);padding:13px 30px;border-radius:13px;
font-size:.84rem;font-weight:700;z-index:11000;opacity:0;transition:all .35s ease;
pointer-events:none;font-family:'DM Sans',sans-serif;
box-shadow:0 8px 30px rgba(9,27,66,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
.wcard{padding:32px 22px 28px}
.qc{padding:20px 18px}
.topbar{padding:10px 14px}
.bbar{padding:12px 14px;gap:10px}
.bb{padding:12px 20px;font-size:.82rem}
.qscroll{padding:16px 0}
.qlist{padding:0 12px}
}
</style>
</head>

<script>

ps.forEach((p,i)=>{
p.addEventListener('input',()=>{
p.value=p.value.replace(/\D/g,'');
if(p.value&&i<ps.length-1)ps[i+1].focus();
const c=Array.from(ps).map(x=>x.value).join('');
if(c.length===4&&cb)cb(c);
});
p.addEventListener('keydown',e=>{
if(e.key==='Backspace'&&!p.value&&i>0){ps[i-1].focus();ps[i-1].value='';}
});
p.addEventListener('paste',e=>{
e.preventDefault();
const d=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,4);
d.split('').forEach((c,j)=>{if(ps[j])ps[j].value=c;});
if(d.length===4&&cb)cb(d);
if(d.length>0)ps[Math.min(d.length,3)].focus();
});
});
}
initPins('.wp',null);
initPins('.pp',null);

/* ─── START ─── */
document.getElementById('goBtn').addEventListener('click',go);
function go(){
const nm=document.getElementById('sName').value.trim();
const cd=Array.from(document.querySelectorAll('.wp')).map(x=>x.value).join('');
const er=document.getElementById('werr');
if(!nm){er.textContent='Please enter your name.';return}
if(cd!==PASS){er.textContent='Incorrect access code.';return}
sname=nm;
document.getElementById('welcome').style.display='none';
document.getElementById('exam').style.display='block';
document.getElementById('nBar').textContent=sname;
render();
goFS();
initProc();
}

/* ─── FULLSCREEN ─── */
function goFS(){const e=document.documentElement;(e.requestFullscreen||e.webkitRequestFullscreen||e.msRequestFullscreen||function(){}).call(e)}

/* ─── PROCTORING ─── */
function initProc(){document.addEventListener('visibilitychange',onV);window.addEventListener('blur',onV)}
function onV(){if(done)return;if(document.hidden||!document.hasFocus())showP()}
function showP(){
document.getElementById('proctor').style.display='flex';
document.querySelectorAll('.pp').forEach(p=>p.value='');
document.getElementById('perr').textContent='';
setTimeout(()=>{const f=document.querySelector('.pp[data-i="0"]');if(f)f.focus()},200);
}
document.getElementById('pBtn').addEventListener('click',()=>{
const c=Array.from(document.querySelectorAll('.pp')).map(x=>x.value).join('');
if(c===PPASS){document.getElementById('proctor').style.display='none';goFS()}
else document.getElementById('perr').textContent='Incorrect proctor code.';
});

/* ─── RENDER ─── */
function render(){
const l=document.getElementById('qL');l.innerHTML='';
QS.forEach(q=>{
const c=document.createElement('div');c.className='qc';c.id='q'+q.n;
const th=q.t.replace(/_______/g,'<span class="bl">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
c.innerHTML=`<div class="qn">Question ${q.n}</div><div class="qt">${th}</div>
<div class="opts">${q.o.map((o,i)=>`<button class="ob" data-q="${q.n}" data-i="${i}"><span class="ol">${LT[i]}</span><span>${o}</span></button>`).join('')}</div>`;
l.appendChild(c);
});
l.addEventListener('click',e=>{
const b=e.target.closest('.ob');if(!b||done)return;
const qn=+b.dataset.q,idx=+b.dataset.i;
ans[qn]=idx;
const cd=document.getElementById('q'+qn);
cd.querySelectorAll('.ob').forEach(x=>x.classList.remove('sel'));
b.classList.add('sel');cd.classList.add('answered');
updProg();
});
}

/* ─── PROGRESS ─── */
function updProg(){
const d=Object.keys(ans).length,tot=QS.length,pct=Math.round(d/tot*100);
const circ=2*Math.PI*18;
document.getElementById('rFg').style.strokeDashoffset=circ-(d/tot)*circ;
document.getElementById('rTxt').textContent=pct+'%';
}

/* ─── COPY ─── */
function getTxt(){
let l=['EDUNEST – Grammar Exam 5.2','Student: '+sname,'Date: '+new Date().toLocaleDateString(),'','Answers:',''];
QS.forEach(q=>{if(ans[q.n]!==undefined)l.push(`${q.n}. ${LT[ans[q.n]]}`)});
return l.join('\n');
}
function cpAns(){
navigator.clipboard.writeText(getTxt()).then(()=>toast('Answers copied!')).catch(()=>{
const t=document.createElement('textarea');t.value=getTxt();document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('Answers copied!');
});
}
document.getElementById('cpBtn').addEventListener('click',cpAns);

/* ─── SUBMIT ─── */
document.getElementById('subBtn').addEventListener('click',()=>{
if(!confirm('Are you sure you want to submit your answers?'))return;
done=true;
document.removeEventListener('visibilitychange',onV);
window.removeEventListener('blur',onV);
if(document.exitFullscreen)document.exitFullscreen().catch(()=>{});
document.getElementById('exam').style.display='none';
document.getElementById('proctor').style.display='none';
showRes();
makePDF();
});

/* ─── RESULTS ─── */
function showRes(){
document.getElementById('result').style.display='block';
document.getElementById('rSub').textContent=sname+' · '+new Date().toLocaleString();
const g=document.getElementById('rGrid');g.innerHTML='';
QS.forEach(q=>{
const d=document.createElement('div');
if(ans[q.n]!==undefined){
d.className='rai';
d.innerHTML=`<span class="rq">Q${q.n}</span><span class="ra">${LT[ans[q.n]]}</span>`;
}else{
d.className='rai un';
d.innerHTML=`<span class="rq">Q${q.n}</span><span class="ra">—</span>`;
}
g.appendChild(d);
});
}
document.getElementById('rCp').addEventListener('click',cpAns);
document.getElementById('rPdf').addEventListener('click',makePDF);

/* ─── PDF GENERATOR ─── */
function makePDF(){
const pw=595.28,ph=841.89,m=50;
let y=m;const items=[];let pages=[[]];
function addT(text,sz,bold,col){
pages[pages.length-1].push({text,x:m,y,size:sz,bold,color:col||'#0e2d6e'});
y+=sz*1.7;
}
function np(){y=m;pages.push([])}

addT('EDUNEST – Grammar Exam 5.2',18,true,'#1648c2');
y+=2;
addT('Student: '+sname,11,false);
addT('Date: '+new Date().toLocaleString(),11,false);
y+=16;
addT('Answers',14,true,'#1648c2');
y+=8;

const cols=5,cw=99,ch=30;
let cx=m,cy=y;
QS.forEach(q=>{
if(cx+cw>pw-m){cx=m;cy+=ch}
if(cy+ch>ph-m){np();cy=m;cx=m}
if(ans[q.n]!==undefined){
pages[pages.length-1].push({rect:true,x:cx,y:cy,w:cw-4,h:ch-4,fill:'#f0f5ff',stroke:'#b8cfff'});
pages[pages.length-1].push({text:`Q${q.n}: ${LT[ans[q.n]]}`,x:cx+12,y:cy+18,size:10,bold:false,color:'#0e2d6e'});
}
cx+=cw;
});

// build
const pdf=bPDF(pw,ph,pages);
const blob=new Blob([pdf],{type:'application/pdf'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download=`Grammar_Exam52_${sname.replace(/\s+/g,'_')}.pdf`;
a.click();URL.revokeObjectURL(url);
toast('PDF saved!');
}

function bPDF(pw,ph,pages){
const built=[];let n=0;
function ao(){n++;built[n]=null;return n}
const catN=ao(),pgsN=ao(),f1N=ao(),f2N=ao();
const pgNs=[],ctNs=[];
pages.forEach(()=>{pgNs.push(ao());ctNs.push(ao())});

built[catN]=`${catN} 0 obj\n<< /Type /Catalog /Pages ${pgsN} 0 R >>\nendobj`;
built[pgsN]=`${pgsN} 0 obj\n<< /Type /Pages /Kids [${pgNs.map(x=>x+' 0 R').join(' ')}] /Count ${pages.length} >>\nendobj`;
built[f1N]=`${f1N} 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>\nendobj`;
built[f2N]=`${f2N} 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>\nendobj`;

pages.forEach((pg,pi)=>{
let s='';
pg.forEach(it=>{
if(it.rect){
const f=hRGB(it.fill),st=hRGB(it.stroke);
s+=`${f.r} ${f.g} ${f.b} rg ${st.r} ${st.g} ${st.b} RG 1 w ${it.x} ${ph-it.y-it.h} ${it.w} ${it.h} re B\n`;
}else if(it.text){
const c=hRGB(it.color||'#000000'),fn=it.bold?'F2':'F1';
s+=`BT /${fn} ${it.size} Tf ${c.r} ${c.g} ${c.b} rg ${it.x} ${ph-it.y} Td (${esc(it.text)}) Tj ET\n`;
}
});
built[pgNs[pi]]=`${pgNs[pi]} 0 obj\n<< /Type /Page /Parent ${pgsN} 0 R /MediaBox [0 0 ${pw} ${ph}] /Contents ${ctNs[pi]} 0 R /Resources << /Font << /F1 ${f1N} 0 R /F2 ${f2N} 0 R >> >> >>\nendobj`;
built[ctNs[pi]]=`${ctNs[pi]} 0 obj\n<< /Length ${s.length} >>\nstream\n${s}endstream\nendobj`;
});

let body='%PDF-1.4\n';const off=[];
for(let i=1;i<=n;i++){off[i]=body.length;body+=built[i]+'\n'}
const xr=body.length;
body+=`xref\n0 ${n+1}\n0000000000 65535 f \n`;
for(let i=1;i<=n;i++)body+=String(off[i]).padStart(10,'0')+' 00000 n \n';
body+=`trailer\n<< /Size ${n+1} /Root ${catN} 0 R >>\nstartxref\n${xr}\n%%EOF`;
return new Uint8Array([...body].map(c=>c.charCodeAt(0)));
}
function hRGB(h){const v=parseInt(h.slice(1),16);return{r:((v>>16)&255)/255,g:((v>>8)&255)/255,b:(v&255)/255}}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)')}

/* ─── TOAST ─── */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2300)}
</script>
